<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Marcus McCallum archived project card</title>
  <desc id="desc">An archival card for Marcus McCallum Ltd noting the current site routes to a gated login.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1b2233" />
      <stop offset="100%" stop-color="#49536d" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <rect x="84" y="84" width="1432" height="732" rx="36" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" />
  <text x="120" y="192" fill="#f0c987" font-family="IBM Plex Sans, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="8">ARCHIVED PROJECT</text>
  <text x="120" y="318" fill="#ffffff" font-family="Sora, Arial, sans-serif" font-size="92" font-weight="800">Marcus McCallum Ltd</text>
  <text x="120" y="392" fill="#dbe2f1" font-family="IBM Plex Sans, Arial, sans-serif" font-size="38">Luxury retail and e-commerce improvements for a London gemstone business.</text>
  <text x="120" y="488" fill="#ffffff" font-family="IBM Plex Sans, Arial, sans-serif" font-size="42" font-weight="700">marcusmccallum.co.uk</text>
  <text x="120" y="564" fill="#dbe2f1" font-family="IBM Plex Sans, Arial, sans-serif" font-size="34">Current public site access now routes behind login, so this entry uses an archival card.</text>
  <text x="120" y="670" fill="#f0c987" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" letter-spacing="4">WORK INCLUDED</text>
  <text x="120" y="730" fill="#ffffff" font-family="IBM Plex Sans, Arial, sans-serif" font-size="34">E-commerce enhancements, secure payment gateways, and improved search.</text>
</svg>
